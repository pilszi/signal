    <head>
        <script>
            (function checkAuth() {
                // 1. 세션 스토리지에서 아이디 확인
                const savedUserId = sessionStorage.getItem("savedUserId");
                
                // 2. 로그인 여부 판단 (값이 없거나 'guest'인 경우)
                if (!savedUserId || savedUserId === "guest" || savedUserId === "null") {
                    // 로그인 안 됨: 경고창을 띄우고 로그인 페이지로 이동
                    alert("로그인 후 이용해주세요.");
                    location.href = "login.html";
                    
                    // 페이지 본문이 보이지 않도록 즉시 중단 (일종의 가드)
                    document.documentElement.style.display = 'none';
                }
            })();
        </script>

        <!-- 2. Profile Page Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

                                <!-- 수정 모드 키워드 (기본 숨김) -->

                                    <!-- 추가 버튼 -->
                                    <button type="button" onclick="addKeywordInput()" 
                                        id="add-keyword-btn"

                                        <i data-lucide="plus" class="w-4 h-4"></i>
                                    </button>
                                    <p class="text-xs text-blue-600 mt-2">

                                    </p>
                                </div>

                            <!-- 비밀번호 변경 (수정 모드 시 노출) -->
                            <div id="password-change-area" class="hidden pt-4 border-t">
                                <label class="flex items-center gap-2 text-sm font-medium mb-2 text-gray-700">

                                <input type="password" placeholder="새 비밀번호 확인" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>

                            <!-- 저장 버튼 (수정 모드 시 노출) -->
                            <button type="submit" id="save-btn" class="hidden w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition-colors font-bold shadow-md">

            <!-- 공통 알림 모달 -->

                    <p id="modal-message" class="text-center font-medium text-gray-800 mb-6"></p>
                    <button onclick="closeModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-bold">확인</button>

            </div>
                <!-- 회원정보 수정 페이지 하단에 배치 -->
        <div class="mt-12 pt-6 border-t border-gray-200">
            <h3 class="text-lg font-medium text-gray-900">계정 관리</h3>
            <p class="text-sm text-gray-500 mb-4">계정을 삭제하면 모든 데이터가 영구적으로 제거됩니다.</p>
            <button onclick="openDeleteModal()" class="text-red-600 hover:text-red-700 font-medium text-sm underline">
                회원 탈퇴하기

        </div>

        <!-- 회원 탈퇴 확인 모달 (초기엔 hidden) -->
        <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 px-4">
            <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-red-600"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-900">정말 탈퇴하시겠습니까?</h2>
                </div>

                <div class="bg-red-50 p-3 rounded-lg mb-4 text-xs text-red-800 leading-relaxed">
                    • 저장된 맞춤 키워드 및 뉴스 기록 삭제<br>
                    • 리스크 시그널 알림 해제<br>
                    • 탈퇴 후 동일 계정 재가입 불가
                </div>

                <form id="modalDeleteForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
                        <input type="password" id="modalPassword" placeholder="비밀번호를 입력하세요" 
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    </div>

                    <div class="flex items-start gap-2">
                        <input type="checkbox" id="modalConfirm" class="mt-1 h-4 w-4 text-red-600">
                        <label for="modalConfirm" class="text-xs text-gray-600">
                            안내 사항을 확인하였으며, 데이터 복구가 불가능함에 동의합니다.
                        </label>

                    <div class="flex gap-2 pt-2">
                        <button type="button" onclick="closeDeleteModal()" 
                                class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium">
                            취소
                        </button>
                        <button type="submit" 
                                class="flex-1 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium">

    </body>
    <script>
        // 초기 데이터 및 상태
        let isEditing = false;
        let userData = {
            name: "홍길동",
            email: "hong@example.com",
            phone: "010-1234-5678",
            keywords: ["석유", "반도체", "자동차", "금리"]
        };
        let originalData = { ...userData };

        document.addEventListener('DOMContentLoaded', () => {
            axios.get("/log_time");
            updateNavbar();

            renderKeywords();
            lucide.createIcons();
        });

        // Navbar 상태 업데이트
        function updateNavbar() {
            const authContainer = document.getElementById('authContainer');
            // 태그가 없을 시 함수 종료(에러방지)
            console.log(authContainer);
            if (!authContainer){return};
            const userNameSpan = document.getElementById('user_name');
            const loggedInId = sessionStorage.getItem('savedUserId');
            const userGreeting = document.getElementById('user-greeting');
            // console.log(`${loggedInId} / ${userNameSpan} / ${userGreeting}`);

            if (loggedInId && loggedInId !== 'guest' && loggedInId !== 'null') {
                // 1. 인사말 영역 처리
                if (userGreeting && userNameSpan) {
                    userNameSpan.textContent = loggedInId; // 아이디 텍스트 삽입
                    userGreeting.classList.remove('hidden'); // 'hidden' 클래스 제거하여 노출
                }

                // 2. 로그아웃 버튼 표시
                authContainer.innerHTML = `
                    <button onclick="handleLogout()" class="px-4 py-2 text-sm font-medium text-blue-600 rounded-lg hover:bg-gray-100 transition-colors uppercase">
                        LOG OUT
                    </button>
                `;
            } else {
                // 로그아웃 상태일 때
                if (userGreeting) {
                    userGreeting.classList.add('hidden'); // 인사말 숨김
                }

                authContainer.innerHTML = `
                    <a href="login.html" class="px-4 py-2 text-sm font-medium text-blue-600 rounded-lg hover:bg-gray-100 transition-colors uppercase">
                        LOG IN
                    </a>
                `;
            }
            
            if (window.lucide) lucide.createIcons();
        }

        // 키워드 렌더링 (조회 모드)
        function renderKeywords() {
            const container = document.getElementById('keyword-view');
            container.innerHTML = userData.keywords.map(k => `
                <span class="px-3 py-1.5 bg-blue-50 text-blue-700 rounded-lg text-sm border border-blue-200 font-medium">
                    ${k}
                </span>
            `).join('');
        }

        // 수정 모드 전환
        function toggleEdit() {
            isEditing = !isEditing;
            const btn = document.getElementById('edit-toggle-btn');
            const saveBtn = document.getElementById('save-btn');
            const pwArea = document.getElementById('password-change-area');
            const kwView = document.getElementById('keyword-view');
            const kwEdit = document.getElementById('keyword-edit-area');
            const inputs = [document.getElementById('form-email'), document.getElementById('form-phone')];

            if (isEditing) {
                // 수정 모드 진입
                originalData = { ...userData, keywords: [...userData.keywords] };
                btn.innerText = "취소";
                btn.classList.replace('bg-blue-600', 'bg-gray-100');
                btn.classList.replace('text-white', 'text-gray-700');
                saveBtn.classList.remove('hidden');
                pwArea.classList.remove('hidden');
                kwView.classList.add('hidden');
                kwEdit.classList.remove('hidden');
                // 입력 필드 활성화
                inputs.forEach(input => input.disabled = false);
                
                // [핵심] 키워드 입력창 초기화 및 기존값 채우기
                initKeywordInputs();
            } else {
                // 취소
                userData = { ...originalData };
                btn.innerText = "프로필 수정";
                btn.classList.replace('bg-gray-100', 'bg-blue-600');
                btn.classList.replace('text-gray-700', 'text-white');
                saveBtn.classList.add('hidden');
                pwArea.classList.add('hidden');
                kwView.classList.remove('hidden');
                kwEdit.classList.add('hidden');
                // 입력 필드 비활성화
                inputs.forEach(input => input.disabled = true);
                
                // 취소 시 데이터 복구
                document.getElementById('form-email').value = userData.email;
                document.getElementById('form-phone').value = userData.phone;
                renderKeywords();
            }
            if (window.lucide){
                lucide.createIcons();
            }
        }

        // 키워드 입력 필드 초기화 (수정 모드용)
        function initKeywordInputs() {
            const container = document.getElementById('keyword-container');
            // [핵심] 기존에 화면에 떠있던 인풋 '태그'들만 삭제 (데이터는 userData에 안전함)
            container.innerHTML = '';

            // 기존 데이터(value)를 가지고 인풋 필드들을 생성
            if (userData.keywords && userData.keywords.length > 0) {
                userData.keywords.forEach((kw) => addKeywordInput(kw));
            } else {
                addKeywordInput(""); // 데이터가 없으면 빈 칸 하나 노출
            }
        }

        // 개별 키워드 필드 생성 
        function addKeywordInput(value = "", index = null) {
            const container = document.getElementById('keyword-container');
            const div = document.createElement('div');
            
            // 콤팩트한 사이즈와 디자인 적용
            div.className = "flex gap-1 items-center keyword-group"; 
            div.innerHTML = `
                <input type="text" name="keywords[]" value="${value}" 
                    class="keyword-input w-32 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    placeholder="관심 키워드">
                <button type="button" onclick="this.parentElement.remove()" 
                    class="text-gray-400 hover:text-red-500 transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;
            
            // 추가 버튼(있다면) 바로 앞에 삽입하거나, 순서대로 추가
            container.appendChild(div);
            
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function removeKeywordField(btn) {
            const rows = document.querySelectorAll('.keyword-row');
            if (rows.length > 1) {
                btn.parentElement.remove();
                updateButtons();
            }
        }

        function updateButtons() {
            const rows = document.querySelectorAll('.keyword-row');
            rows.forEach((row, idx) => {
                const plusBtn = row.querySelector('button[onclick*="addKeywordField"]');
                plusBtn.style.display = (idx === rows.length - 1) ? 'block' : 'none';
            });
        }

        // 폼 제출
        function handleSubmit(e) {
            e.preventDefault();
            
            const email = document.getElementById('form-email').value;
            const phone = document.getElementById('form-phone').value;
            const keywordInputs = document.querySelectorAll('.keyword-input');
            const keywords = Array.from(keywordInputs).map(input => input.value.trim()).filter(v => v);

            if (keywords.length === 0) {
                showModal("최소 하나 이상의 키워드를 입력해주세요.", "error");
                return;
            }

            // 데이터 업데이트
            userData.email = email;
            userData.phone = phone;
            userData.keywords = keywords;

            // UI 업데이트
            document.getElementById('display-email').innerText = email;
            renderKeywords();
            toggleEdit(); // 수정 모드 종료
            
            showModal("개인정보가 성공적으로 수정되었습니다.", "success");
        }

        // 모달 제어
        function showModal(msg, type) {
            const modal = document.getElementById('alert-modal');
            const iconDiv = document.getElementById('modal-icon');
            document.getElementById('modal-message').innerText = msg;
            
            if(type === 'success') {
                iconDiv.innerHTML = '<i data-lucide="check-circle" class="w-12 h-12 text-green-500"></i>';
            } else {
                iconDiv.innerHTML = '<i data-lucide="alert-circle" class="w-12 h-12 text-blue-500"></i>';
            }
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('alert-modal').classList.add('hidden');
        }

        async function handleLogout() {
            if(confirm("로그아웃 하시겠습니까?")){
                try {
                    await axios.get("/logout");
                    sessionStorage.removeItem('savedUserId');
                    location.href = "login.html";
                }catch (error) {
                    console.error("로그아웃 중 오류 발생:", error);
                    alert("로그아웃 처리 중 문제가 발생했습니다. 다시 시도해주세요.");
                }
            } 
        }
                // 모달 열기
        function openDeleteModal() {
            document.getElementById('deleteModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
        }

        // 모달 닫기
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            // 입력값 초기화
            document.getElementById('modalPassword').value = "";
            document.getElementById('modalConfirm').checked = false;
        }

        // 탈퇴 폼 제출 처리
        document.getElementById('modalDeleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('modalPassword').value;
            const isConfirmed = document.getElementById('modalConfirm').checked;
            const savedUserId = sessionStorage.getItem("savedUserId")
            
            if (!isConfirmed) {
                alert("탈퇴 동의 체크박스에 체크해주세요.");
                return;
            }

            if (!password.trim()) {
                alert("비밀번호를 입력해주세요.");
                return;
            }

            // 서버로 탈퇴 요청
            axios.get("/delete_member?id="+savedUserId).then(({data}) => {
                console.log(data);
            });
            // 서버 연동 전 테스트 로직 (리액트 코드 기준)
            if (password === "admin123") {
                if(confirm("최종 확인: 정말로 계정을 삭제하시겠습니까?")) {

                    // 2. 세션 삭제
                    sessionStorage.removeItem("savedUserId");
                    localStorage.removeItem("loginAttempts");
                    localStorage.removeItem("loginBlockEndTime");
                    
                    alert("회원 탈퇴가 완료되었습니다. 메인 페이지로 이동합니다.");
                    location.href = "main.html"; // 메인으로 리다이렉트
                }
            } else {
                alert("비밀번호가 일치하지 않습니다.");
                document.getElementById('modalPassword').value = "";
            }
        });
    </script>
