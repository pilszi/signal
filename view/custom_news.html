<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        (function checkAuth() {
            // 1. 세션 스토리지에서 아이디 확인
            const savedUserId = sessionStorage.getItem("savedUserId");
            
            // 2. 로그인 여부 판단 (값이 없거나 'guest'인 경우)
            if (!savedUserId || savedUserId === "guest" || savedUserId === "null") {
                // 로그인 안 됨: 경고창을 띄우고 로그인 페이지로 이동
                alert("로그인 후 이용해주세요.");
                location.href = "login.html";
                
                // 페이지 본문이 보이지 않도록 즉시 중단 (일종의 가드)
                document.documentElement.style.display = 'none';
            }
        })();
    </script> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 뉴스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .notif-container {
                position: relative;
                display: inline-block;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            }
        .notif-trigger {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px;           /* 적절한 클릭 영역 */
                transition: all 0.2s;   /* 부드러운 hover 효과 */
                position: relative;
                border: none;           /* 기본 보더 제거 */
                background: none;       /* 기본 배경 제거 */
                cursor: pointer;
            }

            .notif-badge {
                position: absolute;
                top: 2px;
                right: 2px;
                background-color: #ef4444; /* red-500 */
                color: white;
                font-size: 10px;
                font-weight: bold;
                width: 16px;
                height: 16px;
                border-radius: 9999px;
                align-items: center;
                justify-content: center;
                border: 2px solid white; /* 버튼 배경과 구분되도록 흰색 테두리 추가 */
            }

            /* 드롭다운 본체 */
            .notif-dropdown {
                position: absolute;
                right: 0;
                top: calc(100% + 8px);
                width: 350px;
                background-color: white;
                border: 1px solid #e5e7eb;
                border-radius: 0.75rem; /* rounded-xl */
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                z-index: 9999 !important;
            }

            .hidden { display: none; }

            /* 헤더 */
            .notif-header {
                padding: 16px;
                border-bottom: 1px solid #f3f4f6;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .header-title { font-size: 16px; font-weight: bold; color: #111827; }
            .header-count { font-size: 13px; color: #6b7280; }

            /* 알림 목록 */
            .notif-body {
                max-height: 400px;
                overflow-y: auto;
            }

            .notif-item {
                padding: 16px;
                display: flex;
                gap: 12px;
                border-bottom: 1px solid #f3f4f6;
                cursor: pointer;
                transition: background-color 0.2s;
                position: relative;
            }

            .notif-item:hover { background-color: #f9fafb; }
            .notif-item.unread { background-color: #eff6ff; }

            /* 아이콘 박스 */
            .icon-wrapper {
                width: 40px;
                height: 40px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }

            .type-signal { background-color: #fee2e2; color: #dc2626; }
            .type-keyword { background-color: #dbeafe; color: #2563eb; }
            .type-profile { background-color: #f3f4f6; color: #4b5563; }

            .content-wrapper { flex: 1; }
            .item-title { font-size: 14px; font-weight: 600; color: #1f2937; margin-bottom: 2px; }
            .item-msg { font-size: 13px; color: #4b5563; line-height: 1.4; }
            .item-footer { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
            .item-time { font-size: 12px; color: #9ca3af; }
            .unread-dot { width: 6px; height: 6px; background-color: #3b82f6; border-radius: 50%; }

            /* 삭제 버튼 */
            .delete-btn {
                background: none;
                border: none;
                color: #d1d5db;
                padding: 4px;
                cursor: pointer;
                height: fit-content;
            }

            .delete-btn:hover { color: #9ca3af; }

            /* 푸터 */
            .notif-footer {
                padding: 12px;
                text-align: center;
                background-color: #f9fafb;
            }

            .all-read-btn {
                background: none;
                border: none;
                color: #2563eb;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
            }

            .all-read-btn:hover { text-decoration: underline; }
    </style>
</head>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2 text-gray-900">맞춤형 뉴스</h1>
            <p class="text-gray-600">관심 키워드에 맞는 뉴스를 확인하세요</p>
        </div>

        <div class="mb-6">
            <div id="keyword-filters" class="flex items-center gap-3 flex-wrap">
                <i data-lucide="filter" class="w-5 h-5 text-gray-400"></i>
                </div>
        </div>

        <div class="mb-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <p id="stats-text" class="text-sm text-gray-500">
                </p>
            <div class="flex items-center gap-2">
                <span class="text-sm text-gray-500">정렬:</span>
                <span class="text-sm font-medium text-gray-700 bg-white px-2 py-1 rounded border">읽지 않음 → Signal 점수 → 최신순</span>
            </div>
        </div>

    <script>
        // 1. Mock Data (React의 mockCustomNews 대체)
        const mockCustomNews = [
            { id: 1, title: "삼성전자, 차세대 HBM 공급 확대", media: "경제일보", imageUrl: "https://picsum.photos/seed/1/400/250", analysisTime: "2026-04-28T14:30:00", url: "#", riskScore: 85, riskLevel: 3, customKeyword: "반도체", isRead: false },
            { id: 2, title: "연준, 금리 동결 가능성 시사", media: "금융신문", imageUrl: "https://picsum.photos/seed/2/400/250", analysisTime: "2026-04-28T10:00:00", url: "#", riskScore: 45, riskLevel: 1, customKeyword: "금리", isRead: true },
            { id: 3, title: "SK하이닉스 신규 공장 착공", media: "IT뉴스", imageUrl: "https://picsum.photos/seed/3/400/250", analysisTime: "2026-04-28T16:00:00", url: "#", riskScore: 92, riskLevel: 3, customKeyword: "반도체", isRead: false },
            { id: 4, title: "환율 변동성 확대에 따른 대응책", media: "데일리경제", imageUrl: "https://picsum.photos/seed/4/400/250", analysisTime: "2026-04-27T18:00:00", url: "#", riskScore: 65, riskLevel: 2, customKeyword: "환율", isRead: false },
            { id: 5, title: "반도체 수출 지표 역대 최고", media: "산업일보", imageUrl: "https://picsum.photos/seed/5/400/250", analysisTime: "2026-04-28T09:00:00", url: "#", riskScore: 70, riskLevel: 2, customKeyword: "반도체", isRead: true }
        ];

        let selectedKeyword = null;

        // Navbar 상태 업데이트
        function updateNavbar() {
            const authContainer = document.getElementById('authContainer');
            // 태그가 없을 시 함수 종료(에러방지)
            console.log(authContainer);
            if (!authContainer){return};
            const userNameSpan = document.getElementById('user_name');
            const loggedInId = sessionStorage.getItem('savedUserId');
            const userGreeting = document.getElementById('user-greeting');
            // console.log(`${loggedInId} / ${userNameSpan} / ${userGreeting}`);

            if (loggedInId && loggedInId !== 'guest' && loggedInId !== 'null') {
                // 1. 인사말 영역 처리
                if (userGreeting && userNameSpan) {
                    userNameSpan.textContent = loggedInId; // 아이디 텍스트 삽입
                    userGreeting.classList.remove('hidden'); // 'hidden' 클래스 제거하여 노출
                }

                // 2. 로그아웃 버튼 표시
                authContainer.innerHTML = `
                    <button onclick="handleLogout()" class="px-4 py-2 text-sm font-medium text-blue-600 rounded-lg hover:bg-gray-100 transition-colors uppercase">
                        LOG OUT
                    </button>
                `;
            } else {
                // 로그아웃 상태일 때
                if (userGreeting) {
                    userGreeting.classList.add('hidden'); // 인사말 숨김
                }

                authContainer.innerHTML = `
                    <a href="login.html" class="px-4 py-2 text-sm font-medium text-blue-600 rounded-lg hover:bg-gray-100 transition-colors uppercase">
                        LOG IN
                    </a>
                `;
            }
            
            if (window.lucide) lucide.createIcons();
        }

        // 알림 데이터 (로그인 여부에 따라 세팅 가능)
        let myNotifs = [
            { id: 1, type: "signal", title: "3단계 위험 시그널", message: "이란 석유 수출 관련 높은 위험도 감지", time: "5분 전", isRead: false },
            { id: 2, type: "keyword", title: "키워드 알림: 반도체", message: "중국 반도체 관련 새로운 뉴스가 등록되었습니다", time: "1시간 전", isRead: false },
            { id: 3, type: "signal", title: "3단계 위험 시그널", message: "우크라이나 곡물 수출 중단 감지", time: "2시간 전", isRead: false },
            { id: 4, type: "profile", title: "개인정보 수정 완료", message: "프로필 정보가 성공적으로 업데이트되었습니다", time: "3시간 전", isRead: true }
        ];

        const trigger = document.getElementById('notifTrigger');
        const dropdown = document.getElementById('notifDropdown');
        const list = document.getElementById('notifList');

        // 토글 이벤트
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
        });

        // 외부 클릭 시 닫기
        document.addEventListener('click', (e) => {
            if (!document.getElementById('notifContainer').contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

        // 알림 렌더링 함수
        function updateNotifUI() {
            const badge = document.getElementById('notifBadge');
            const list = document.getElementById('notifList');
            const countText = document.getElementById('notifCountText');
            // 1. 로그인 여부 확인 (React 코드의 로직 반영)
            const savedUserId = sessionStorage.getItem("savedUserId");
            
            // 로그인 정보가 없거나 guest인 경우 알림 목록을 표시하지 않음
            if (!savedUserId || savedUserId === "guest") {
                badge.style.display = 'none'; // 배지 숨김
                countText.innerText = '0개의 새 알림';
                list.innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <p style="color: #9ca3af; font-size: 14px;">로그인 후 알림을 확인하세요.</p>
                    </div>`;
                return;
            }
            
            const unreads = myNotifs.filter(n => !n.isRead);
            
            // 새 알림이 있을 때만 배지 표시
            if (unreads.length > 0) {
                badge.innerText = unreads.length;
                badge.style.display = 'flex'; // 로그인 + 새 알림 있음 -> 표시
            } else {
                badge.style.display = 'none'; // 로그인 + 새 알림 없음 -> 숨김
            }

            // 드롭다운 내부 문구 업데이트
            countText.innerText = `${unreads.length}개의 새 알림`;

            // 알림 리스트 렌더링 로직 (기존과 동일)
            renderList(list);
        }

        function renderList(container) {
            if (myNotifs.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #9ca3af;">새로운 알림이 없습니다.</div>';
                return;
            }
            
            container.innerHTML = myNotifs.map(n => {
                // 1. 아이콘을 담을 변수 선언
                let iconTag = '';

                // 2. type에 따른 조건문 처리
                if (n.type === 'signal') {
                    iconTag = '<i data-lucide="alert-triangle" style="color: #ef4444;"></i>';
                } else if (n.type === 'keyword') {
                    iconTag = '<i data-lucide="tag" style="color: #3b82f6;"></i>';
                } else {
                    iconTag = '<i data-lucide="user" style="color: #6b7280;"></i>';
                }

                // 3. 생성된 iconTag를 템플릿 리터럴에 삽입
                return `
                    <div class="notif-item ${n.isRead ? '' : 'unread'}" 
                        onclick="readItem(${n.id}, '${n.type}')" 
                        style="cursor: pointer;">
                        <div class="notif-icon">
                            ${iconTag}
                        </div>
                        <div class="notif-content">
                            <div class="notif-title">${n.title}</div>
                            <div class="notif-message">${n.message}</div>
                            <div class="notif-time">${n.time} ${n.isRead ? '' : '<span class="unread-dot"></span>'}</div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        // 아이콘 매칭 함수
        function getIcon(type) {
            if (type === 'signal') return 'alert-triangle';
            if (type === 'keyword') return 'tag';
            return 'user';
        }

        // 아이템 클릭 (읽음 처리 및 이동)
        function readItem(id, type) {
            myNotifs = myNotifs.map(n => n.id === id ? {...n, isRead: true} : n);
            updateNotifUI();
            if (type === 'signal') {
                location.href = 'signal_log.html';
            } else if (type === 'keyword') {
                location.href = 'custom_news.html';
            } else {
                location.href = 'profile.html';
            }
        }

        // 아이템 삭제
        function deleteItem(e, id) {
            e.stopPropagation();
            myNotifs = myNotifs.filter(n => n.id !== id);
            updateNotifUI();
        }

        // 모두 읽음
        function allRead() {
            myNotifs = myNotifs.map(n => ({...n, isRead: true}));
            updateNotifUI();
        }


        // 2. 키워드 추출 (중복 제거)
        const keywords = Array.from(new Set(mockCustomNews.map(n => n.customKeyword)));

        // 3. 뉴스 카드 컴포넌트 (Template Function)
        function createNewsCard(news) {
            const riskColors = {
                1: "bg-blue-100 text-blue-700",
                2: "bg-yellow-100 text-yellow-700",
                3: "bg-red-100 text-red-700"
            };

            return `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden hover:shadow-md transition-shadow relative ${news.isRead ? 'opacity-75' : ''}">
                    <img src="${news.imageUrl}" alt="news" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-2 py-1 text-xs font-semibold rounded ${riskColors[news.riskLevel] || 'bg-gray-100'}">
                                Signal ${news.riskScore}
                            </span>
                            <span class="text-xs text-blue-600 font-medium">#${news.customKeyword}</span>
                        </div>
                        <h3 class="font-bold text-lg mb-2 line-clamp-2">${news.title}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-sm text-gray-500">${news.media}</span>
                            <span class="text-xs text-gray-400">${news.analysisTime.split('T')[0]}</span>
                        </div>
                    </div>
                    ${!news.isRead ? '<div class="absolute top-2 right-2 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>' : ''}
                    <a href="${news.url}" class="stretched-link" onclick="handleRead(${news.id})"></a>
                </div>
            `;
        }

        // 4. 필터 및 정렬 렌더링 함수
        function render() {
            const filterContainer = document.getElementById('keyword-filters');
            const newsGrid = document.getElementById('news-grid');
            const statsText = document.getElementById('stats-text');

            // 필터 버튼 생성
            filterContainer.innerHTML = '<i data-lucide="filter" class="w-5 h-5 text-gray-400"></i>';
            
            // '전체' 버튼
            const allBtn = document.createElement('button');
            allBtn.innerText = '전체';
            allBtn.className = `px-4 py-2 rounded-lg transition-colors ${selectedKeyword === null ? "bg-gray-900 text-white" : "bg-gray-100 text-gray-700 hover:bg-gray-200"}`;
            allBtn.onclick = () => { selectedKeyword = null; render(); };
            filterContainer.appendChild(allBtn);

            // 개별 키워드 버튼
            keywords.forEach(kw => {
                const btn = document.createElement('button');
                btn.innerText = kw;
                btn.className = `px-4 py-2 rounded-lg transition-colors ${selectedKeyword === kw ? "bg-blue-500 text-white" : "bg-blue-50 text-blue-600 hover:bg-blue-100"}`;
                btn.onclick = () => { selectedKeyword = kw; render(); };
                filterContainer.appendChild(btn);
            });

            // 필터링 및 정렬 로직
            const filtered = mockCustomNews.filter(n => !selectedKeyword || n.customKeyword === selectedKeyword);
            const sorted = [...filtered].sort((a, b) => {
                if (a.isRead !== b.isRead) return a.isRead ? 1 : -1;
                if (a.riskScore !== b.riskScore) return b.riskScore - a.riskScore;
                return new Date(b.analysisTime) - new Date(a.analysisTime);
            });

            // 뉴스 그리드 채우기
            newsGrid.innerHTML = sorted.map(news => createNewsCard(news)).join('');
            
            // 통계 갱신
            const unreadCount = sorted.filter(n => !n.isRead).length;
            statsText.innerText = `${sorted.length}개의 뉴스 · 읽지 않은 뉴스 ${unreadCount}개`;

            lucide.createIcons();
        }

        // 읽음 처리 핸들러 (데모용)
        window.handleRead = (id) => {
            const index = mockCustomNews.findIndex(n => n.id === id);
            if (index !== -1) mockCustomNews[index].isRead = true;
            render();
        };

        // 초기 렌더링
        render();

        document.addEventListener('DOMContentLoaded', () => {
            // 현재 브라우저의 파일명만 추출
            const currentPath = window.location.pathname.split("/").pop() || "index.html";
            const navItems = document.querySelectorAll('.nav-item');

            navItems.forEach(item => {
                // href 속성값에서 파일명만 가져와서 비교
                const itemHref = item.getAttribute('href').split("/").pop();
                
                if (currentPath === itemHref) {
                    if (item.querySelector('i')) {
                        item.classList.replace('text-gray-600', 'text-blue-600');
                        item.classList.add('bg-blue-50');
                    } else {
                        item.classList.remove('text-gray-600', 'hover:bg-gray-50');
                        item.classList.add('bg-gradient-to-br', 'from-blue-600', 'to-blue-800', 'text-white');
                    }
                }
                
            });
            axios.get("/session_out");
            updateNavbar();
            updateNotifUI();

            if (window.lucide) lucide.createIcons();
        });

        async function handleLogout() {
            if(confirm("로그아웃 하시겠습니까?")){
                try {
                    await axios.get("/logout");
                    sessionStorage.removeItem('savedUserId');
                    location.href = "login.html";
                }catch (error) {
                    console.error("로그아웃 중 오류 발생:", error);
                    alert("로그아웃 처리 중 문제가 발생했습니다. 다시 시도해주세요.");
                }
            } 
        }      
        

        // window.onload = function(){
            
        // };
    </script>
